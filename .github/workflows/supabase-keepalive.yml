name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 10 */5 * *'  # Cada 5 días a las 10am UTC
  workflow_dispatch:         # También ejecutable manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/tenants?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          echo "Supabase respondió con HTTP $STATUS"

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "406" ]; then
            echo "✅ Supabase activo y respondiendo."
          else
            echo "❌ Respuesta inesperada: $STATUS"
            exit 1
          fi
